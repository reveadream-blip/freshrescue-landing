# SEO : dans Netlify > Site settings > Environment variables, ajoutez VITE_SITE_URL = https://votre-domaine-canonical
# (canonical Open Graph + sitemap au build ; sinon Netlify fournit souvent URL au build)

[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
