<!DOCTYPE html>
<html lang="fr-CH">
  <head>
    <!-- Google tag (gtag.js) — avec Consent Mode v2 (RGPD / nLPD Suisse) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VDSJYFKB65"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;

      // Consent Mode v2 : tout refusé par défaut tant que l'utilisateur n'a pas choisi.
      // Les consentements sauvegardés sont réappliqués par le composant CookieBanner au boot.
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        functionality_storage: 'granted',
        security_storage: 'granted',
        wait_for_update: 500
      });

      gtag('js', new Date());
      gtag('config', 'G-VDSJYFKB65', { anonymize_ip: true });
    </script>

    <meta charset="UTF-8" />
    <!-- SPA : l’accueil visuel est `src/pages/Landing.jsx` (route /) ; ce <head> est commun à toutes les URLs et c’est lui que les crawlers lisent en premier. -->

    <link rel="icon" type="image/png" sizes="192x192" href="/logo192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/logo512.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo192.png" sizes="192x192" />

    <link rel="manifest" href="/manifest.json" />

    <meta name="theme-color" content="#ff6b2b" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Accessibilité + SEO : pas de blocage du zoom ; le composant Seo enrichit title/description en SPA -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="FreshRescue" />
    <meta name="geo.region" content="CH" />

    <title>FreshRescue — App anti-gaspillage pour la Suisse</title>
    
    <meta name="description" content="FreshRescue : l’application suisse anti-gaspillage alimentaire. Sauvez les invendus près de chez vous, carte de la Suisse, prix flash." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
